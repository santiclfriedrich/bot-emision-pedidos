<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Facturación Automática</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="8" y1="13" x2="16" y2="13"/>
          <line x1="8" y1="17" x2="13" y2="17"/>
        </svg>
      </div>
      <div>
        <h1>Facturación Automática</h1>
        <p class="subtitle">Seleccioná la logística para emitir facturas.</p>
      </div>
    </div>
  </header>

  <main>
    <section>
      <h2 class="section-title">Logísticas</h2>
      <div class="botones">
        {% for l in logisticas %}
          <button
            class="btn-logistica"
            data-logistica="{{ l.id }}"
            {% if not l.enabled %}disabled title="{{ l.nota }}"{% endif %}>
            <span class="label">{{ l.label }}</span>
            {% if not l.enabled %}<span class="nota">{{ l.nota }}</span>{% endif %}
          </button>
        {% endfor %}
      </div>
    </section>

    <section>
      <h2 class="section-title">Estado</h2>
      <div class="estado">
        <div id="estado-actual">Sin ejecución activa.</div>
      </div>
    </section>

    <section class="logs">
      <div class="logs-header">
        <h2>Logs en vivo</h2>
        <button id="btn-limpiar" type="button">Limpiar</button>
      </div>
      <pre id="log-output" aria-live="polite"></pre>
    </section>
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
